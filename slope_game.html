<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SLOPE - Cyberpunk Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

        body {
            width: 100%;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            background: #0a0e27;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 136, 0.03),
                    rgba(0, 255, 136, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            z-index: 100;
            animation: scanlines 8s linear infinite;
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-panel {
            position: absolute;
            color: #00ff88;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8), 0 0 20px rgba(255, 0, 255, 0.4);
            z-index: 50;
            border: 2px solid rgba(0, 255, 136, 0.5);
            padding: 15px 20px;
            background: rgba(10, 14, 39, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 10px rgba(0, 255, 136, 0.1);
        }

        #scorePanel {
            top: 20px;
            left: 20px;
        }

        #speedPanel {
            top: 20px;
            right: 20px;
        }

        #comboPanel {
            bottom: 20px;
            left: 20px;
        }

        .ui-value {
            font-size: 32px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 1), 0 0 30px rgba(0, 255, 136, 0.5);
            animation: pulse 0.3s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .ui-label {
            font-size: 12px;
            color: rgba(0, 255, 136, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #gameOverScreen.show {
            display: flex;
        }

        .game-over-title {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #ff0088;
            text-shadow: 0 0 20px rgba(255, 0, 136, 0.8), 0 0 40px rgba(255, 0, 136, 0.4);
            animation: flicker 0.3s ease-in-out;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .game-over-stats {
            font-size: 24px;
            margin: 20px 0;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }

        .game-over-stat-item {
            margin: 10px 0;
            font-family: 'Space Mono', monospace;
        }

        .stat-label {
            color: rgba(0, 255, 255, 0.6);
            font-size: 16px;
        }

        .restart-button {
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            color: #0a0e27;
            background: #00ff88;
            border: 3px solid #00ff88;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .restart-button:hover {
            background: #00ffaa;
            box-shadow: 0 0 40px rgba(0, 255, 136, 1), 0 0 60px rgba(0, 255, 136, 0.5);
            transform: scale(1.05);
        }

        .restart-button:active {
            transform: scale(0.98);
        }

        #instructionsPanel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: rgba(0, 255, 136, 0.6);
            text-align: right;
            font-family: 'Space Mono', monospace;
        }

        .instruction-item {
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .combo-active {
            animation: comboFlash 0.2s ease;
        }

        @keyframes comboFlash {
            0% { transform: scale(1); color: #00ff88; }
            50% { transform: scale(1.3); color: #ffff00; }
            100% { transform: scale(1); color: #00ff88; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui-panel" id="scorePanel">
            <div class="ui-label">Score</div>
            <div class="ui-value" id="scoreValue">0</div>
        </div>

        <div class="ui-panel" id="speedPanel">
            <div class="ui-label">Speed</div>
            <div class="ui-value" id="speedValue">1.0x</div>
        </div>

        <div class="ui-panel" id="comboPanel">
            <div class="ui-label">Combo</div>
            <div class="ui-value" id="comboValue">0x</div>
        </div>

        <div id="instructionsPanel">
            <div class="instruction-item">← → or A/D to move</div>
            <div class="instruction-item">Don't hit walls!</div>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-title">CRASHED</div>
            <div class="game-over-stats">
                <div class="game-over-stat-item">
                    <span class="stat-label">Final Score:</span>
                    <span id="finalScore">0</span>
                </div>
                <div class="game-over-stat-item">
                    <span class="stat-label">Max Combo:</span>
                    <span id="maxCombo">0x</span>
                </div>
                <div class="game-over-stat-item">
                    <span class="stat-label">Distance Traveled:</span>
                    <span id="distance">0</span>
                </div>
            </div>
            <button class="restart-button" onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game variables
        const game = {
            score: 0,
            combo: 0,
            maxCombo: 0,
            distance: 0,
            speed: 1,
            maxSpeed: 1,
            gameOver: false,
            difficulty: 1
        };

        // Player ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            vx: 0,
            vy: 0,
            acceleration: 0.5,
            maxVx: 8,
            friction: 0.95
        };

        // Particles array
        let particles = [];

        // Obstacles
        let obstacles = [];
        let obstacleSpeed = 8;

        // Game state
        let keys = {};

        // Event listeners
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Particle class
        class Particle {
            constructor(x, y, vx, vy, color, life = 30) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 3 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // gravity
                this.life--;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Obstacle class
        class Obstacle {
            constructor(x, y, width, height, type = 'wall') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.rotation = 0;
            }

            update() {
                this.y += obstacleSpeed * game.speed;
            }

            draw(ctx) {
                if (this.type === 'wall') {
                    // Draw wall with glow
                    ctx.shadowColor = 'rgba(255, 0, 136, 0.8)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#ff0088';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.shadowBlur = 0;
                } else if (this.type === 'gap') {
                    // Safe zone
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.2)';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }

            isColliding(ball) {
                return ball.x + ball.radius > this.x &&
                       ball.x - ball.radius < this.x + this.width &&
                       ball.y + ball.radius > this.y &&
                       ball.y - ball.radius < this.y + this.height;
            }
        }

        function spawnObstacles() {
            const gapWidth = 80 + (game.difficulty * 5);
            const wallWidth = (canvas.width - gapWidth) / 2;
            const minDistance = 120;

            if (obstacles.length === 0 || obstacles[obstacles.length - 1].y > minDistance) {
                const gapX = Math.random() * (canvas.width - gapWidth);
                
                // Left wall
                obstacles.push(new Obstacle(0, -100, gapX, 80, 'wall'));
                
                // Right wall
                obstacles.push(new Obstacle(gapX + gapWidth, -100, canvas.width - (gapX + gapWidth), 80, 'wall'));
            }
        }

        function updateBall() {
            if (game.gameOver) return;

            // Horizontal movement
            if (keys['arrowleft'] || keys['a']) {
                ball.vx = -ball.maxVx;
            } else if (keys['arrowright'] || keys['d']) {
                ball.vx = ball.maxVx;
            } else {
                ball.vx *= 0.92;
            }

            ball.x += ball.vx;

            // Boundary collision
            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.5;
            }
            if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -0.5;
            }

            // Vertical movement (always falling)
            ball.vy += 0.6;
            ball.y += ball.vy;

            // Prevent leaving top
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy = 0;
            }

            // Game over if falls off screen
            if (ball.y > canvas.height + 100) {
                endGame();
            }
        }

        function checkCollisions() {
            if (game.gameOver) return;

            let hitObstacle = false;

            for (let obstacle of obstacles) {
                if (obstacle.type === 'wall' && obstacle.isColliding(ball)) {
                    endGame();
                    return;
                }
            }

            // Check if passed through gap
            for (let i = 0; i < obstacles.length; i++) {
                if (obstacles[i].y > ball.y && obstacles[i].y - ball.radius > ball.y - ball.radius) {
                    // Passed through
                    if (obstacles[i].type === 'wall') {
                        // Check if we're in a gap
                        let inGap = false;
                        if (i + 1 < obstacles.length) {
                            const nextObstacle = obstacles[i + 1];
                            if (ball.x > nextObstacle.x && ball.x < nextObstacle.x + nextObstacle.width) {
                                inGap = true;
                            }
                        }
                        
                        if (inGap) {
                            game.score += Math.floor(10 * game.speed * game.difficulty);
                            game.combo++;
                            game.distance += 100;
                            game.difficulty = 1 + (game.score / 500);
                            
                            // Score pulse effect
                            document.getElementById('scoreValue').classList.add('combo-active');
                            setTimeout(() => {
                                document.getElementById('scoreValue').classList.remove('combo-active');
                            }, 200);

                            // Create particles
                            for (let j = 0; j < 5; j++) {
                                particles.push(new Particle(
                                    ball.x,
                                    ball.y,
                                    (Math.random() - 0.5) * 6,
                                    Math.random() * -5,
                                    '#00ff88',
                                    20
                                ));
                            }
                        }
                    }
                }
            }

            updateUI();
        }

        function updateUI() {
            document.getElementById('scoreValue').textContent = game.score;
            document.getElementById('speedValue').textContent = (1 + (game.difficulty - 1) * 0.3).toFixed(1) + 'x';
            document.getElementById('comboValue').textContent = game.combo + 'x';
            
            if (game.combo > game.maxCombo) {
                game.maxCombo = game.combo;
            }

            game.speed = 1 + (game.difficulty - 1) * 0.3;
            obstacleSpeed = 6 + (game.difficulty - 1) * 2;
        }

        function endGame() {
            game.gameOver = true;
            document.getElementById('gameOverScreen').classList.add('show');
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('maxCombo').textContent = game.maxCombo + 'x';
            document.getElementById('distance').textContent = (game.distance / 10).toFixed(0) + ' m';
        }

        function drawBall() {
            // Glow effect
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Inner circle
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius - 3, 0, Math.PI * 2);
            ctx.fill();

            // Trail effect
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y + ball.radius * 1.5, ball.radius * 0.7, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBackground() {
            // Dark gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0e27');
            gradient.addColorStop(0.5, '#1a1a3e');
            gradient.addColorStop(1, '#0a0e27');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid pattern
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
        }

        function update() {
            if (!game.gameOver) {
                updateBall();
                checkCollisions();
                spawnObstacles();

                // Update obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].update();
                    if (obstacles[i].y > canvas.height + 200) {
                        obstacles.splice(i, 1);
                    }
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function draw() {
            drawBackground();

            if (!game.gameOver) {
                // Draw obstacles
                for (let obstacle of obstacles) {
                    obstacle.draw(ctx);
                }
            }

            // Draw particles
            for (let particle of particles) {
                particle.draw(ctx);
            }

            // Draw ball
            drawBall();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        gameLoop();
    </script>
</body>
</html>
